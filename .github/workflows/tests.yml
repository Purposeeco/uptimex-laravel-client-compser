name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, zlib, mbstring
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Hermetic suite (Unit + Feature)
        run: composer test

      - name: Real-network failure-mode tests
        # The Integration suite has two flavors: failure-mode tests (loopback /
        # invalid hostnames — always run) and real-backend tests (env-gated;
        # skipped here because CI has no UPTIMEX_INTEGRATION_INGEST_URL secret).
        # The skipped ones print "skipped" and the failure-mode ones exercise
        # the SDK's fail-closed promise against real sockets.
        run: composer test:integration

  release:
    # Auto-tag a patch-bumped release on every successful push to main.
    # PRs don't release (only the test job runs). The first push without
    # any existing tag bootstraps as v0.1.0; subsequent pushes increment
    # the patch component (v0.1.0 → v0.1.1 → v0.1.2 → …).
    #
    # To cut a minor or major release, manually tag locally and push the
    # tag (`git tag v0.2.0 && git push origin v0.2.0`); the next auto
    # release will then patch-bump from there.
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to read existing tags

      - name: Compute next version
        id: bump
        run: |
          # Find the most recent semver tag, default to v0.0.0 if none exist
          LATEST=$(git tag -l 'v[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
            echo "No existing tags — bootstrapping at v0.1.0"
            NEXT="v0.1.0"
          else
            # Parse vMAJOR.MINOR.PATCH and bump the patch
            CLEAN="${LATEST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CLEAN"
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            echo "Latest tag: $LATEST → next: $NEXT"
          fi
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Create + push tag
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          NEXT="${{ steps.bump.outputs.next }}"
          git tag -a "$NEXT" -m "Auto-release $NEXT (commit ${GITHUB_SHA::7})"
          git push origin "$NEXT"
          echo "✓ Pushed $NEXT — Packagist webhook should pick it up within ~60s."
